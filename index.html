<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Calculator</title>
</head>
<body>
    <div class="calculator">
        <div class="theme-toggler">
            <input type="checkbox" id="theme-switch" class="theme-switch-checkbox">
            <label for="theme-switch" class="theme-switch-label">
                <i class="fa-regular fa-sun sun"></i>
                <i class="fa-regular fa-moon moon"></i>
            </label>
        </div>
        <div class="display">
            <div class="back">2 + 2</div>
            <div class="front">4</div>
        </div>
        <div class="buttons">
            <button class="btn clear">C</button>
            <button class="btn delete">Del</button>
            <button class="btn number">%</button>
            <button class="btn operator">÷</button>

            <button class="btn number">7</button>
            <button class="btn number">8</button>
            <button class="btn number">9</button>
            <button class="btn operator">x</button>

            <button class="btn number">4</button>
            <button class="btn number">5</button>
            <button class="btn number">6</button>
            <button class="btn operator">-</button>

            <button class="btn number">1</button>
            <button class="btn number">2</button>
            <button class="btn number">3</button>
            <button class="btn operator">+</button>

            <button class="btn number">,</button>
            <button class="btn number">0</button>
            <button class="btn number">00</button>
            <button class="btn equal">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
